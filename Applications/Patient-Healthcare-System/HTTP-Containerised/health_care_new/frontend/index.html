<!DOCTYPE html>
<html>
<head>
  <title>Healthcare Monitor</title>
  <style>
    body { font-family: Arial; background: #f5f5f5; }
    .card {
      background: white;
      padding: 15px;
      margin: 10px;
      border-radius: 8px;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
    }
    .normal { color: green; font-weight: bold; }
    .abnormal { color: red; font-weight: bold; }
  </style>
</head>
<body>
  <h2>🫀 Healthcare Monitoring Dashboard</h2>
  <div id="data"></div>

  <script>
    async function fetchData() {
      try {
        const res = await fetch("http://localhost:5000/api/latest");
        const data = await res.json();
        const container = document.getElementById("data");
        container.innerHTML = "";

        data.forEach(d => {
          container.innerHTML += `
            <div class="card">
              <p><b>Time:</b> ${d.timestamp}</p>
              <p>HR: ${d.data.heart_rate} BPM</p>
              <p>SpO2: ${d.data.spo2} %</p>
              <p>BP: ${d.data.bp} mmHg</p>
              <p>Temp: ${d.data.temp} °C</p>
              <p>Status: <span class="${d.status}">${d.status}</span></p>
              <p>Alerts: ${d.alerts.join(", ") || "None"}</p>
            </div>
          `;
        });
      } catch (error) {
        console.error("Error fetching data:", error);
      }
    }

    fetchData();
    setInterval(fetchData, 5000);
  </script>
</body>
</html>
